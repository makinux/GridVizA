<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body,
        #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #cesiumContainer {
            position: fixed;
            inset: 0;
        }

        #toolbar {
            margin: 5px;
            padding: 2px 5px;
            position: absolute;
            z-index: 9999;
            color: #fff;
        }

        #toolbarToggle {
            display: none;
            width: 100%;
            margin-bottom: 6px;
        }

        #toolbarContent {
            display: block;
        }

        input {
            width: 70px;
        }

        input[type="checkbox"] {
            width: auto;
        }

        #samplePreset {
            width: 240px;
        }

        #tilePath, #terrainPath {
            width: 200px;
        }

        @media (max-width: 768px) {
            #toolbar {
                max-width: calc(100vw - 10px);
                padding: 6px;
                background: rgba(26, 33, 41, 0.82);
                border-radius: 6px;
            }

            .cesium-viewer .cesium-widget-credits {
                display: none !important;
            }

            .cesium-viewer-fullscreenContainer,
            .cesium-viewer-vrContainer {
                right: 8px;
                bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
                z-index: 20;
            }

            #toolbarToggle {
                display: block;
            }

            #toolbar.collapsed #toolbarContent {
                display: none;
            }

            #toolbarContent {
                max-height: 60vh;
                overflow: auto;
            }

            #toolbar td {
                font-size: 12px;
                white-space: nowrap;
            }

            #samplePreset {
                width: 180px;
            }
        }
    </style>
    <script src="./js/lib/Cesium-1.109/Cesium.js"></script>
    <link href="./js/lib/Cesium-1.109/Widgets/widgets.css" rel="stylesheet">
    <script type="text/javascript" src="/js/lib/geotiffjs/geotiff.bundle.js"></script>
    <!-- jQuery -->
    <script src="./js/lib/jquery-3.7.1.min.js"></script>
</head>

<body>
    <div id="cesiumContainer">
        <div id="toolbar">
            <button id="toolbarToggle" type="button" aria-controls="toolbarContent" aria-expanded="true">Hide controls</button>
            <div id="toolbarContent">
                <table>
                    <tr>
                        <td>Sample preset</td>
                        <td>
                            <select id="samplePreset"></select>
                        </td>
                    </tr>
                    <tr>
                        <td>Minimum</td>
                        <td>
                            <input type="text" id="RangeMin">
                        </td>
                    </tr>
                    <tr>
                        <td>Maximum</td>
                        <td>
                            <input type="text" id="RangeMax">
                        </td>
                    </tr>
                    <tr>
                        <td>Curvature coefficient</td>
                        <td>
                            <input type="text" id="curvatureArg">
                        </td>
                    </tr>
                    <tr>
                        <td>Slope-angle coefficient</td>
                        <td>
                            <input type="text" id="slopeArg">
                        </td>
                    </tr>
                    <tr>
                        <td>Color-map opacity</td>
                        <td>
                            <input type="text" id="depthTr">
                        </td>
                    </tr>
                    <tr>
                        <td>Contour interval</td>
                        <td>
                            <input type="text" id="contourInterval">
                        </td>
                    </tr>
                    <tr>
                        <td>Model opacity</td>
                        <td>
                            <input type="text" id="modelTr">
                        </td>
                    </tr>
                    <tr>
                        <td>Invert Z scale</td>
                        <td>
                            <input type="checkbox" id="invertZScale">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button id="settingBtn">Apply</button>
                        </td>
                        <td>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>

<script type="text/javascript" src="js/main.js"></script>
<script>
    init();
</script>

</html>
